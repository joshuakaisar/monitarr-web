services:
  monitarr:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    container_name: monitarr-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - SONARR_URL=http://sonarr:8989
      - SONARR_API_KEY=
      - RADARR_URL=http://radarr:7878
      - RADARR_API_KEY=
      - LIDARR_URL=http://lidarr:8686
      - LIDARR_API_KEY=
      - PROWLARR_URL=http://prowlarr:9696
      - PROWLARR_API_KEY=
      - AUTH_ENABLED=false
      - AUTH_PASSWORD=
    command: npm run dev
    restart: unless-stopped
